#logging.level.org.springframework.web.reactive.function.client.ExchangeFunctions=TRACE
#spring.mvc.log-request-details=true

#enable the batch to run on startup
spring.batch.job.enabled=true

# prevent the webflux code from starting the web server as we do not need it for the REST client
spring.main.web-application-type=none
spring.main.log-startup-info=false
spring.main.banner-mode=off

# MariaDB Configuration
spring.datasource.url=${DM_DB_URL}
spring.datasource.username=${DM_DB_USER}
spring.datasource.password=${DM_DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# for production
#spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=update

# the following makes the startup start fresh with the database - I think
spring.jpa.generate-ddl=true
#spring.jpa.hibernate.ddl-auto=create-drop

spring.batch.jdbc.initialize-schema=never

# suppress BeanPostProcessorChecker startup warnings (broader package-level logger)
logging.level.org.springframework.context.support=ERROR
#logging.level.org.springframework.context.support.PostProcessorRegistrationDelegate$BeanPostProcessorChecker=ERROR

# keep collector app logs readable for frequent batch runs
logging.level.ca.admin.delivermore.collector=INFO
logging.level.org.springframework=WARN
logging.level.org.springframework.batch=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN

